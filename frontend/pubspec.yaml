name: ghostos
description: GhostOS - Your Habits Build Your World.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  flutter_hooks: ^0.21.2
  hooks_riverpod: ^2.6.1
  go_router: ^14.8.1
  google_fonts: ^6.3.0
  intl: ^0.20.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  lottie: ^3.3.1
  supabase: ^2.14.0
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/animations/
    - assets/icons/
    - assets/images/
